apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secrets
  namespace: default
type: Opaque
stringData:
  JWT_ACCESS_SECRET: "change-me-access-secret-at-least-32-chars"
  JWT_REFRESH_SECRET: "change-me-refresh-secret-at-least-32-chars"
  DATABASE_URL: "postgres://auth_user:auth_pass@postgres-svc:5432/auth_db?sslmode=disable"
  REDIS_ADDR: "redis-svc:6379"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq-svc:5672/"
