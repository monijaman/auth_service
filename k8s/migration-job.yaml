apiVersion: batch/v1
kind: Job
metadata:
  name: auth-migrate
  namespace: default
  labels:
    app: auth-service
    component: migration
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300   # auto-delete the job pod after 5 min
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: migrate/migrate:latest
          args:
            - "-path=/migrations"
            - "-database=$(DATABASE_URL)"
            - "up"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: DATABASE_URL
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: auth-migrations
