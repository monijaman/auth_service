version: "3.9"

services:
  auth:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: auth-service:latest
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      CONFIG_PATH: /configs/config.yaml
      DATABASE_URL: postgres://auth_user:auth_pass@postgres:5432/auth_db?sslmode=disable
      REDIS_ADDR: redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auth-net

  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - auth-net

  redis:
    image: redis:7-alpine
    container_name: auth-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - auth-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: auth-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - auth-net

  migrate:
    image: migrate/migrate
    container_name: auth-migrate
    command: ["-path", "/migrations", "-database", "postgres://auth_user:auth_pass@postgres:5432/auth_db?sslmode=disable", "up"]
    volumes:
      - ./migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - auth-net
    profiles:
      - migrate

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  auth-net:
    driver: bridge
